name: Build and Deploy NodeJS App on AWS

on:
  push:
    branches:
      - main

jobs:
  Build-App:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker Image
        run: |
          docker build -t nodeimages .

      - name: Tag Docker Image
        run: |
          docker tag nodeimages:latest 714196736234.dkr.ecr.ap-south-1.amazonaws.com/nodeimages:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 714196736234.dkr.ecr.ap-south-1.amazonaws.com/nodeimages:latest

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ecs-task.json
          service: nodeapp-service
          cluster: frugal-bear-qdm9fr
          wait-for-service-stability: true
